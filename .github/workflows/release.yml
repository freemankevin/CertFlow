name: Update latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update 'latest' release
        uses: softprops/action-gh-release@v2  # 升级到最新稳定版（2026年1月为v2.5.0+）
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}     # 确保指向最新提交
          
          # 核心：每次都覆盖旧的 release body，而不是追加
          body: |
            **ACME-SSL-Breeze** - 单文件自动续期 acme.sh + Nginx Docker 的 SSL 证书工具
            
            ### 一行安装/更新（推荐）
            ```bash
            curl -L https://github.com/freemankevin/acme-ssl-breeze/archive/refs/tags/latest.tar.gz | tar -xz && cd acme-ssl-breeze-latest