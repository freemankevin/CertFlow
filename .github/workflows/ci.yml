name: Update latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update 'latest' release
        uses: softprops/action-gh-release@v2  # 升级到最新稳定版（2026年1月为v2.5.0+）
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}     # 确保指向最新提交