name: Update latest release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 把 latest 标签强制指向当前提交
      - name: Move latest tag to HEAD
        run: |
          git tag -f latest
          git push -f origin latest

      # 2. 重建 latest release（覆盖源码包）
      - name: Re-create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: "使用方法见 README.md"
          prerelease: false
          draft: false
          generate_release_notes: false
          files: |
            README.md
            renew-ssl-cert.sh
          target_commitish: ${{ github.sha }}